site_name: voicetest docs
site_url: https://voicetest.dev/docs/
repo_url: https://github.com/voicetestdev/voicetest
edit_uri: edit/main/docs/

extra:
  homepage: https://voicetest.dev/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font: false
  palette:
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Light mode
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Dark mode
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - toc.follow
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - Changelog: changelog.md
  - Start Here:
    - Getting Started: getting-started.md
    - Core Concepts: concepts.md
  - Recipes:
    - recipes/index.md
    - Diagnose a failing test: recipes/diagnose-failing-test.md
    - Import call history: recipes/import-call-history.md
    - Regression-test prompt changes: recipes/regression-test-prompt-changes.md
    - Run in GitHub Actions: recipes/ci-github-actions.md
  - Details:
    - Architecture: architecture.md
    - Claude Code Integration: claude-code.md
    - CLI Reference: cli.md
    - Configuration: configuration.md
    - Development: development.md
    - Features: features.md
    - Models guide: models.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true
  - tables

plugins:
  - search

exclude_docs: |
  MOLTBOT.md
  RESEARCH.md
  demos/README.md
