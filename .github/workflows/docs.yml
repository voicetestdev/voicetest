name: Deploy docs

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build docs
        run: uvx --with mkdocs-material mkdocs build --strict --site-dir _site

      - name: Deploy to GitHub Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.DOCS_DEPLOY_TOKEN }}
          external_repository: voicetestdev/voicetestdev.github.io
          publish_branch: main
          publish_dir: ./_site
          destination_dir: docs
          keep_files: true
